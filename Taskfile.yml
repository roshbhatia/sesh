version: "3"
vars:
  BINARY_NAME: sesh
  INSTALL_DIR: '{{.HOME}}/.local/bin'
tasks:
  build:
    desc: Build sesh binary
    cmds:
      - mkdir -p bin
      - go build -o bin/{{.BINARY_NAME}} .
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - bin/{{.BINARY_NAME}}
  install:
    desc: Install sesh to ~/bin
    deps:
      - build
    cmds:
      - mkdir -p {{.INSTALL_DIR}}
      - cp bin/{{.BINARY_NAME}} {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - chmod +x {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - echo "Installed sesh to {{.INSTALL_DIR}}/{{.BINARY_NAME}}"
  uninstall:
    desc: Uninstall sesh from ~/bin
    cmds:
      - rm -f {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - echo "Uninstalled sesh"
  test:
    desc: Run all unit tests
    cmds:
      - go test ./... -v
  test-short:
    desc: Run unit tests without verbose output
    cmds:
      - go test ./...
  test-coverage:
    desc: Run unit tests with coverage
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"
  test-integration:
    desc: Run integration tests inside Docker
    cmds:
      - docker build -f test/integration/Dockerfile -t sesh-integration .
      - docker run --rm sesh-integration
  test-e2e:
    desc: Run end-to-end tests inside Docker
    cmds:
      - docker build -f test/e2e/Dockerfile -t sesh-e2e .
      - docker run --rm sesh-e2e
  test-all:
    desc: Run unit, integration, and e2e tests
    cmds:
      - task: test-short
      - task: test-integration
      - task: test-e2e
  lint:
    desc: Run linter (requires golangci-lint)
    cmds:
      - golangci-lint run
  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...
      - gofmt -s -w .
  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
      - echo "Cleaned build artifacts"
  clean-sessions:
    desc: Clean up all sessions
    cmds:
      - rm -rf "$${XDG_STATE_HOME:-$$HOME/.local/state}/sesh"
      - echo "Cleaned up all sessions"
  dev:
    desc: Build and install for development
    cmds:
      - task: build
      - task: test-short
      - task: install
  check:
    desc: Check if required dependencies are installed
    cmds:
      - |
        echo "Checking dependencies..."
        command -v go >/dev/null 2>&1 && echo "go installed" || echo "go not found"
        command -v zoxide >/dev/null 2>&1 && echo "zoxide installed" || echo "zoxide not found"
        command -v git >/dev/null 2>&1 && echo "git installed" || echo "git not found"
        echo ""
        go version
  default:
    desc: Show available tasks
    cmds:
      - task --list
